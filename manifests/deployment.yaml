apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplewebhook
  labels:
    app: simplewebhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simplewebhook
  template:
    metadata:
      labels:
        app: simplewebhook
    spec:
      containers:
      - name: simplewebhook
        # Digest-pinned; Renovate keeps this current as :main moves.
        image: ghcr.io/kengou/simplewebhook:main@sha256:fb1677934032924c5539a6aff5ea958673ba8d8a0852a415dcff3dd0ca6342b8
        ports:
        - containerPort: 8080
        # env:
        #   # Log request headers and connection metadata on /webhook.
        #   # WARNING: logs every header verbatim, including secrets such as
        #   # Authorization, Cookie, and X-Hub-Signature-256. Enable only for
        #   # trusted debugging. Accepts "true"/"1"/"false"/"0".
        #   - name: LOG_HEADERS
        #     value: "false"
        #   # Shared secret for HMAC-SHA256 signature validation.
        #   # Create with: kubectl create secret generic simplewebhook-secret \
        #   #   --from-literal=webhook-secret=mysecret
        #   - name: WEBHOOK_SECRET
        #     valueFrom:
        #       secretKeyRef:
        #         name: simplewebhook-secret
        #         key: webhook-secret
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 3
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
