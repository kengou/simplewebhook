apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simplewebhook
spec:
  podSelector:
    matchLabels:
      app: simplewebhook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound webhook and health-check traffic on port 8080.
    # Restrict sourceNamespaces/ipBlock here to limit to known callers.
    - ports:
        - port: 8080
          protocol: TCP
  egress: []
